name: Claude code review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

# Cancel an in-flight review when a new commit is pushed to the same PR;
# only the latest revision is worth Claude's attention (and our API budget).
concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts. Authors signal "ready_for_review" when they want feedback.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing this pull request for code quality. The PR branch is checked out in the working directory; use `gh pr diff` and `gh pr view` to inspect, and `Read`/`Grep` to explore the surrounding code.

            Focus on issues that materially affect a future reader or maintainer:

            - **Correctness**: bugs, off-by-one errors, error paths that swallow real failures, race conditions, resource leaks.
            - **Clarity**: unclear naming, dead code, commented-out blocks, premature abstractions, comments that describe *what* the code does rather than *why*.
            - **Missing tests**: new behavior without coverage; edge cases that the diff makes possible but no test exercises.
            - **Consistency**: deviations from patterns already established elsewhere in the repo (check how similar code is written before flagging style choices as "wrong").
            - **Security smells**: things you would expect the dedicated security review to also flag — call them out briefly but defer detail to that workflow.

            Things to NOT comment on:

            - Subjective style preferences not codified in the repo's existing patterns.
            - Trivial nits (whitespace, line length, etc.) — unless they obscure meaning.
            - Hypothetical future requirements (YAGNI).
            - "You could also do X" suggestions that don't fix a real problem.

            Output format:

            - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to attach feedback at specific `file:line`.
            - Use `gh pr comment` only for a single summary if useful — keep it short.
            - If you find nothing material, post a single brief comment saying so. Don't manufacture findings.

            Do not submit review text as chat messages — every piece of feedback must land as a GitHub comment.

          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(grep:*),Bash(rg:*),Bash(find:*)"
